version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devalliance-backend
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=3101
      - HOST=0.0.0.0
      - MONGODB_URI=mongodb://localhost:27017/devalliance
      - BASE_URL=
      - BASE_PATH=
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - mongo
    restart: unless-stopped
    volumes:
      - ./config:/app/config:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/www/devalliance/openclaw-containers:/var/www/devalliance/openclaw-containers

  mongo:
    image: mongo:7
    container_name: devalliance-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=devalliance
    volumes:
      - mongo-data:/data/db
    networks:
      - devalliance-network
    restart: unless-stopped

networks:
  devalliance-network:
    name: devalliance
    external: true

volumes:
  mongo-data:
